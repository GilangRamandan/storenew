<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin GilangStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="admin-page">
    <section class="card">
      <h1>🔐 Admin Panel</h1>
      <p>Login pakai akun admin Supabase Auth.</p>
      <div id="loginBox">
        <input id="email" placeholder="Email admin">
        <input id="password" type="password" placeholder="Password admin">
        <button id="loginBtn" class="main-btn">Login</button>
      </div>
      <div id="adminBox" class="hidden">
        <div class="admin-actions">
          <button id="refreshBtn" class="secondary-btn">Refresh</button>
          <button id="logoutBtn" class="secondary-btn">Logout</button>
        </div>
        <h2>Order Masuk</h2>
        <div id="ordersList"></div>
      </div>
    </section>
  </main>
  <div id="toast" class="toast">OK</div>
  <script type="module" src="admin.js"></script>
</body>
</html>
